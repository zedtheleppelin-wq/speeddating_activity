<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farbenfrohes Turnier · Fenster- & Türseite · 3-Minuten-Timer</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #1e3c2c 0%, #2a5a3a 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(255, 248, 235, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 3rem 3rem 2rem 2rem;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5), inset 0 0 0 2px #e4cd9e;
            padding: 30px 30px 40px;
            max-width: 1400px;
            width: 100%;
        }
        h1 {
            text-align: center;
            margin: 0 0 10px;
            font-weight: 400;
            font-size: 2.4rem;
            letter-spacing: 2px;
            color: #f7e9c3;
            text-shadow: 3px 3px 0 #3f2b15, 5px 5px 0 #00000055;
        }
        .sub {
            text-align: center;
            color: #dbc68e;
            margin-bottom: 30px;
            font-style: italic;
        }
        .control-panel {
            background: #5f7b6e;
            border-radius: 60px;
            padding: 20px 30px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 25px;
            margin-bottom: 30px;
            box-shadow: inset 0 2px 10px #2e4a3a, 0 8px 0 #2c4a38;
            border-bottom: 3px solid #e9d29b;
        }
        .input-group {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #ebdbbd;
            padding: 5px 20px 5px 25px;
            border-radius: 40px;
            box-shadow: inset 0 2px 8px #7b6b4e, 0 4px 0 #5e4e36;
        }
        .input-group label {
            font-weight: 600;
            color: #2d3e2d;
            font-size: 1.3rem;
        }
        .input-group input {
            font-size: 1.5rem;
            width: 80px;
            text-align: center;
            border: none;
            background: #fef6e6;
            border-radius: 30px;
            padding: 8px 0;
            font-weight: 700;
            color: #1f472b;
            box-shadow: inset 0 2px 6px #bba88b;
            border: 1px solid #ffe6b3;
        }
        button {
            background: #f5cd7a;
            border: none;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 12px 25px;
            border-radius: 40px;
            cursor: pointer;
            color: #2b482b;
            box-shadow: 0 7px 0 #9e7d4e, 0 8px 12px black;
            transition: 0.07s linear;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #ffecb3;
        }
        button:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #9e7d4e, 0 5px 10px black;
        }
        button.timer-active {
            background: #ff8c8c;
            color: #2d1a1a;
        }
        .stats {
            background: #382e22d0;
            border-radius: 40px;
            padding: 10px 28px;
            color: #ffefcf;
            font-weight: 600;
            font-size: 1.2rem;
            backdrop-filter: blur(4px);
        }
        .timer-display {
            background: #1f3629;
            border-radius: 50px;
            padding: 8px 25px;
            font-size: 2rem;
            font-weight: 700;
            color: #f5cd7a;
            text-shadow: 0 2px 0 #9e7d4e;
            font-family: 'Courier New', monospace;
            letter-spacing: 5px;
            min-width: 180px;
            text-align: center;
            border: 2px solid #f5cd7a;
        }
        .timer-display.warning {
            color: #ff6b6b;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #2d3e2d;
            border-radius: 30px;
            margin: 20px 0;
            overflow: hidden;
            box-shadow: inset 0 2px 5px black;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #f5cd7a, #f5e6b3);
            width: 0%;
            transition: width 0.3s;
            border-radius: 30px;
        }
        .tables-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px 50px;
            justify-content: center;
            margin: 30px 0 20px;
        }
        .table-wrapper {
            flex: 1 1 450px;
            min-width: 420px;
            background: #8b7a60c0;
            border-radius: 70px 70px 30px 30px;
            padding: 20px 20px 35px;
            box-shadow: 0 20px 0 #4d4232, inset 0 0 0 4px #c9af7b;
            backdrop-filter: blur(2px);
        }
        .table-title {
            text-align: center;
            font-size: 2rem;
            font-weight: 300;
            color: #fef1cf;
            margin: 0 0 5px;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 2px 2px 0 #4d4232;
        }
        .table-subtitle {
            text-align: center;
            font-size: 1.2rem;
            color: #ffe6b3;
            margin-top: -5px;
            margin-bottom: 15px;
            font-style: italic;
        }
        .table-length {
            text-align: center;
            font-size: 1.1rem;
            background: #4f6a5a;
            display: inline-block;
            padding: 4px 25px;
            margin: 0 auto 15px;
            border-radius: 30px;
            color: #efe2bc;
        }
        .seating-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .row {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .seat {
            width: 75px;
            height: 75px;
            border-radius: 20px 20px 8px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 0 #7a684a, 0 5px 15px black;
            font-weight: 700;
            font-size: 1.5rem;
            transition: 0.2s;
            border-bottom: 4px solid #dbb056;
        }
        .seat.sitting-out {
            background: #5c5c5c;
            color: #e0e0e0;
            box-shadow: 0 8px 0 #2f2f2f, 0 5px 15px black;
            border-bottom: 4px solid #a09b8b;
            font-style: italic;
        }
        .seat .nr {
            font-size: 1.6rem;
            line-height: 1.2;
            font-weight: 800;
            text-shadow: 0 2px 3px rgba(0,0,0,0.3);
        }
        .seat .label {
            font-size: 0.7rem;
            opacity: 0.8;
            text-transform: uppercase;
        }
        .verification-panel {
            background: #2d4a3b;
            border-radius: 30px;
            padding: 20px 30px;
            margin-top: 30px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            color: #ffefcf;
        }
        .check-pair {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #1f3629;
            padding: 10px 25px;
            border-radius: 50px;
            flex-wrap: wrap;
        }
        .check-pair input {
            width: 70px;
            padding: 10px;
            text-align: center;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            font-size: 1.2rem;
            background: #fcf0d5;
        }
        .result-badge {
            background: #4f6a5a;
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1.2rem;
            min-width: 280px;
            text-align: center;
            border: 2px solid #f5cd7a;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🌈 FENSTERSEITE · TÜRSEITE 🌈</h1>
    <div class="sub">Minimale Bewegung · Jede:r trifft jede:n · 3-Minuten-Timer</div>

    <div class="control-panel">
        <div class="input-group">
            <label>👥 Anzahl:</label>
            <input type="number" id="participantCount" min="2" max="20" value="20" step="1">
        </div>
        <button id="initBtn">🔄 Neu starten</button>
        <button id="nextRoundBtn">▶️ nächste Runde</button>
        <button id="timerBtn">⏱️ Timer 3min</button>
        <div id="timerDisplay" class="timer-display">03:00</div>
        <div class="stats">
            <span id="roundDisplay">Runde 1/19</span> &nbsp;|&nbsp;
            <span id="pairedCounter">0 / 190 Paare</span>
        </div>
    </div>

    <!-- Fortschrittsbalken -->
    <div class="progress-bar">
        <div id="progressFill" class="progress-fill" style="width: 0%"></div>
    </div>

    <!-- Tische -->
    <div id="tablesDyn" class="tables-container"></div>

    <!-- Info -->
    <div id="infoBox" class="info-text" style="text-align: center; background: #456b54; padding: 15px; border-radius: 50px; margin: 20px 0;">
        ⚡ Jede Farbe = eine Person · Bei ungerader Zahl: <span style="background: #5c5c5c; color: white; padding: 3px 10px; border-radius: 20px;">grauer Platz</span> = ausgesetzt
    </div>

    <!-- Verifikation -->
    <div class="verification-panel">
        <div class="check-pair">
            <span>🔍 Prüfe Paar:</span>
            <input type="number" id="checkP1" min="1" max="20" value="1" placeholder="P1">
            <span style="font-size: 1.5rem;">&</span>
            <input type="number" id="checkP2" min="1" max="20" value="3" placeholder="P2">
            <button id="checkPairBtn" style="font-size: 1.2rem; padding: 10px 25px;">prüfen</button>
        </div>
        <div id="pairResult" class="result-badge">
            ⏳ Paar 1 & 3 prüfen
        </div>
    </div>
</div>

<script>
    (function() {
        // ------ Zentraler Zustand ------
        let participants = [];
        let tables = [];
        let currentRound = 0;
        let history = new Set();
        let totalPossiblePairs = 0;
        let maxRounds = 0;
        let n = 20;
        
        // Timer-Variablen
        let timerInterval = null;
        let timerSeconds = 180; // 3 Minuten = 180 Sekunden
        let timerRunning = false;
        
        // Feste Farben für bis zu 20 Personen
        const personColors = [
            '#FF6B6B', // Rot
            '#4ECDC4', // Türkis
            '#FFD93D', // Gold
            '#6BCB77', // Grün
            '#9D65C9', // Lila
            '#FF8C42', // Orange
            '#5D9B9B', // Blaugrün
            '#E67E8F', // Rosa
            '#86A789', // Salbei
            '#D49B3B', // Ocker
            '#6A4C93', // Violett
            '#FFA07A', // Lachs
            '#5F9EA0', // Cadet Blue
            '#B5838D', // Mauve
            '#7C9D8E', // Minze
            '#E5989B', // Hellrosa
            '#B56576', // Beerenrot
            '#6D597A', // Lavendelgrau
            '#B0A1BA', // Helllila
            '#EAAC8B'  // Pfirsich
        ];

        // UI-Elemente
        const participantInput = document.getElementById('participantCount');
        const initBtn = document.getElementById('initBtn');
        const nextBtn = document.getElementById('nextRoundBtn');
        const timerBtn = document.getElementById('timerBtn');
        const timerDisplay = document.getElementById('timerDisplay');
        const roundSpan = document.getElementById('roundDisplay');
        const pairedSpan = document.getElementById('pairedCounter');
        const progressFill = document.getElementById('progressFill');
        const tablesDiv = document.getElementById('tablesDyn');
        const checkP1 = document.getElementById('checkP1');
        const checkP2 = document.getElementById('checkP2');
        const checkBtn = document.getElementById('checkPairBtn');
        const pairResult = document.getElementById('pairResult');

        // Timer-Funktionen
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function updateTimerDisplay() {
            timerDisplay.textContent = formatTime(timerSeconds);
            if (timerSeconds <= 30) {
                timerDisplay.classList.add('warning');
            } else {
                timerDisplay.classList.remove('warning');
            }
        }

        function startTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            
            timerSeconds = 180;
            timerRunning = true;
            timerBtn.classList.add('timer-active');
            timerBtn.textContent = '⏸️ Timer stopp';
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                if (timerSeconds > 0) {
                    timerSeconds--;
                    updateTimerDisplay();
                    
                    // Automatisch weiter zur nächsten Runde wenn Timer abläuft?
                    if (timerSeconds === 0) {
                        clearInterval(timerInterval);
                        timerInterval = null;
                        timerRunning = false;
                        timerBtn.classList.remove('timer-active');
                        timerBtn.textContent = '⏱️ Timer 3min';
                        timerDisplay.textContent = '03:00';
                        
                        // Optional: Akustisches Signal
                        try {
                            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                            const oscillator = audioCtx.createOscillator();
                            oscillator.type = 'sine';
                            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
                            oscillator.connect(audioCtx.destination);
                            oscillator.start();
                            oscillator.stop(audioCtx.currentTime + 0.3);
                        } catch (e) {
                            console.log('Kein Audio-Signal möglich');
                        }
                        
                        alert('⏰ 3 Minuten sind um! Nächste Runde?');
                    }
                }
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            timerRunning = false;
            timerBtn.classList.remove('timer-active');
            timerBtn.textContent = '⏱️ Timer 3min';
            timerSeconds = 180;
            timerDisplay.textContent = '03:00';
            timerDisplay.classList.remove('warning');
        }

        function toggleTimer() {
            if (timerRunning) {
                stopTimer();
            } else {
                startTimer();
            }
        }

        // Hilfsfunktion: sortiertes Paar
        function makePair(a, b) {
            return a < b ? `${a}-${b}` : `${b}-${a}`;
        }

        // Farbe für eine Person
        function getPersonColor(personId) {
            return personColors[(personId - 1) % personColors.length];
        }

        // Paare aus aktueller Sitzordnung
        function getCurrentPairs() {
            const pairs = [];
            for (const table of tables) {
                const seats = table.seats;
                const half = seats.length / 2;
                for (let i = 0; i < half; i++) {
                    const unten = seats[i];
                    const oben = seats[i + half];
                    if (unten !== null && oben !== null) {
                        pairs.push(makePair(unten, oben));
                    }
                }
            }
            return pairs;
        }

        // History aktualisieren
        function updateHistory() {
            const currentPairs = getCurrentPairs();
            for (const pair of currentPairs) {
                history.add(pair);
            }
        }

        // Stats aktualisieren
        function updateStats() {
            roundSpan.innerText = `Runde ${currentRound}/${maxRounds}`;
            const uniquePairs = history.size;
            pairedSpan.innerText = `${uniquePairs} / ${totalPossiblePairs} Paare`;
            const progress = totalPossiblePairs > 0 ? (uniquePairs / totalPossiblePairs) * 100 : 0;
            progressFill.style.width = progress + '%';
        }

        // Prüfen ob ein bestimmtes Paar schon saß
        function checkPair(a, b) {
            if (a === b) return "🔸 Gleiche Person – kein Paar";
            if (a > participants.length || b > participants.length) return "⚠️ Person nicht vorhanden";
            const pair = makePair(a, b);
            return history.has(pair) ? "✅ Ja, bereits gegenüber gesessen" : "❌ Nein, noch nicht";
        }

        // Zählt die aktuellen freien Plätze
        function countEmptySeats() {
            let empty = 0;
            for (const table of tables) {
                for (const seat of table.seats) {
                    if (seat === null) empty++;
                }
            }
            return empty;
        }

        // Minimale Bewegung Rotation
        function rotateToNextRound() {
            if (!tables.length) return;
            if (currentRound >= maxRounds) {
                alert("🎉 Alle Runden gespielt! Jeder saß jedem gegenüber.");
                return;
            }

            // Sammle alle Plätze in einer Liste (über beide Tische)
            const allSeats = [];
            for (const table of tables) {
                allSeats.push(...table.seats);
            }
            
            // Personen mit ihren aktuellen Positionen
            const persons = allSeats.map((p, idx) => ({ person: p, pos: idx })).filter(item => item.person !== null);
            
            // Zyklische Verschiebung der Personen (minimale Bewegung)
            const personValues = persons.map(p => p.person);
            const last = personValues.pop();
            personValues.unshift(last);
            
            // Baue neue Sitzordnung: leere Plätze bleiben wo sie sind
            const newSeats = Array(allSeats.length).fill(null);
            let personIdx = 0;
            
            for (let i = 0; i < allSeats.length; i++) {
                if (allSeats[i] !== null) {
                    newSeats[i] = personValues[personIdx];
                    personIdx++;
                }
            }

            // Nach jeder 2. Runde tauschen wir die Reihen innerhalb der Tische
            if (currentRound % 2 === 1) {
                for (let t = 0; t < tables.length; t++) {
                    const start = t * 10;
                    const tableSeats = newSeats.slice(start, start + 10);
                    const half = 5;
                    const unten = tableSeats.slice(0, half);
                    const oben = tableSeats.slice(half);
                    
                    // Tausche die Reihen
                    for (let i = 0; i < half; i++) {
                        newSeats[start + i] = oben[i];
                        newSeats[start + i + half] = unten[i];
                    }
                }
            }

            // Neue seats zurück in tables schreiben
            for (let t = 0; t < tables.length; t++) {
                tables[t].seats = newSeats.slice(t * 10, (t + 1) * 10);
            }

            // History updaten
            updateHistory();
            currentRound++;
            updateStats();
            renderTables();
        }

        // Initiale Verteilung
        function buildInitialTables(n) {
            if (n > 20) {
                alert("Maximal 20 Teilnehmende (2 Tische mit je 5 Paaren)");
                participantInput.value = 20;
                n = 20;
            }

            participants = [];
            for (let i = 1; i <= n; i++) {
                participants.push(i);
            }

            const seatsPerTable = 10; // 5 Plätze unten, 5 oben = 10 insgesamt
            
            // Tische mit den neuen Namen
            const tisch1 = { name: 'FENSTERSEITE', seats: Array(seatsPerTable).fill(null) };
            const tisch2 = { name: 'TÜRSEITE', seats: Array(seatsPerTable).fill(null) };

            // Startaufstellung: gleichmäßig verteilen
            let personCounter = 1;
            
            // Tisch1 (Fensterseite) befüllen
            for (let i = 0; i < seatsPerTable && personCounter <= n; i++) {
                tisch1.seats[i] = personCounter;
                personCounter++;
            }
            
            // Tisch2 (Türseite) befüllen
            for (let i = 0; i < seatsPerTable && personCounter <= n; i++) {
                tisch2.seats[i] = personCounter;
                personCounter++;
            }

            tables = [tisch1, tisch2];
            currentRound = 1;
            history = new Set();
            totalPossiblePairs = (n * (n - 1)) / 2;
            
            // Bei ungerader Zahl: Pro Runde gibt es nur 9 Paare (weil einer aussetzt)
            const pairsPerRound = n % 2 === 0 ? 10 : 9;
            maxRounds = Math.ceil(totalPossiblePairs / pairsPerRound);
            
            // Initiale Paare in History
            updateHistory();
            updateStats();
            renderTables();
            
            // Prüffeld aktualisieren
            checkP1.max = n;
            checkP2.max = n;
            pairResult.innerText = "⏳ Prüfen Sie ein Paar";
        }

        // Rendern der Tische mit Farben
        function renderTables() {
            if (!tables || tables.length === 0) return;
            let html = '';

            for (let tIdx = 0; tIdx < tables.length; tIdx++) {
                const table = tables[tIdx];
                const seats = table.seats;
                const half = seats.length / 2; // =5

                // Untere Reihe (Indices 0-4), Obere Reihe (Indices 5-9)
                const unten = seats.slice(0, half);
                const oben = seats.slice(half);

                html += `<div class="table-wrapper">`;
                html += `<div class="table-title">${table.name}</div>`;
                html += `<div class="table-subtitle">${tIdx === 0 ? '🌞 hell & warm' : '🚪 nah am Ausgang'}</div>`;
                html += `<div class="seating-grid">`;

                // Obere Reihe (visuell oben)
                html += `<div class="row">`;
                for (let i = 0; i < half; i++) {
                    html += renderSeat(oben[i]);
                }
                html += `</div>`;

                // Untere Reihe
                html += `<div class="row">`;
                for (let i = 0; i < half; i++) {
                    html += renderSeat(unten[i]);
                }
                html += `</div>`;

                html += `</div>`;
                html += `<div class="table-length">${half} Paarplätze</div>`;
                html += `</div>`;
            }

            tablesDiv.innerHTML = html;
        }

        function renderSeat(personId) {
            if (personId === null || personId === undefined) {
                return `<div class="seat sitting-out"><span class="label">AUS</span><span class="nr">—</span></div>`;
            }
            
            const color = getPersonColor(personId);
            const textColor = '#1d3b1d';
            
            return `<div class="seat" style="background: ${color}; border-bottom: 4px solid #7a684a;">
                        <span class="nr" style="color: ${textColor};">${personId}</span>
                        <span class="label" style="color: ${textColor};">Platz</span>
                    </div>`;
        }

        // Event-Listener
        initBtn.addEventListener('click', () => {
            n = parseInt(participantInput.value, 10);
            if (isNaN(n) || n < 2) n = 2;
            if (n > 20) n = 20;
            participantInput.value = n;
            buildInitialTables(n);
            stopTimer(); // Timer zurücksetzen bei Neustart
        });

        nextBtn.addEventListener('click', () => {
            if (!tables.length) {
                buildInitialTables(parseInt(participantInput.value, 10) || 20);
            }
            rotateToNextRound();
        });

        timerBtn.addEventListener('click', toggleTimer);

        checkBtn.addEventListener('click', () => {
            const p1 = parseInt(checkP1.value, 10);
            const p2 = parseInt(checkP2.value, 10);
            if (isNaN(p1) || isNaN(p2)) {
                pairResult.innerText = "⚠️ Bitte gültige Nummern eingeben";
                return;
            }
            const result = checkPair(p1, p2);
            pairResult.innerText = result;
        });

        // Start mit 20 Personen
        window.addEventListener('load', () => {
            buildInitialTables(20);
        });

        // Eingabe begrenzen
        participantInput.addEventListener('change', function() {
            let v = parseInt(this.value, 10);
            if (v > 20) this.value = 20;
            if (v < 2) this.value = 2;
        });
    })();
</script>
</body>
</html>
